version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://flowmap_user:flowmap_senha@db:5432/flowmap
      TOKEN_SECRET: troque_essa_chave_por_uma_chave_segura
      ADMIN_NAME: Administrador
      ADMIN_EMAIL: admin@flowmap.com
      ADMIN_PASSWORD: Admin@123
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: flowmap_user
      POSTGRES_PASSWORD: flowmap_senha
      POSTGRES_DB: flowmap
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: